<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FocusGuard — Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <style>
    .dashboard-welcome {
      margin-bottom: 32px;
    }

    .dashboard-welcome h2 {
      font-size: 24px;
      margin: 0;
      color: var(--text);
    }

    .dashboard-welcome p {
      font-size: 14px;
      color: var(--muted);
      margin: 4px 0 0 0;
    }

    .dashboard-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }

    .dashboard-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s ease;
      color: #081226;
      text-align: center;
      min-height: 140px;
    }

    .dashboard-btn-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .dashboard-btn-text {
      font-size: 14px;
      font-weight: 600;
    }

    .dashboard-btn.focus {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 8px 24px rgba(124,92,255,0.15);
    }

    .dashboard-btn.focus:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(124,92,255,0.25);
    }

    .dashboard-btn.stats {
      background: linear-gradient(135deg, var(--accent-2), #00d9ff);
      box-shadow: 0 8px 24px rgba(76,194,255,0.15);
    }

    .dashboard-btn.stats:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(76,194,255,0.25);
    }

    .dashboard-btn.settings {
      background: linear-gradient(135deg, #a78bfa, var(--accent));
      box-shadow: 0 8px 24px rgba(167,139,250,0.15);
    }

    .dashboard-btn.settings:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(167,139,250,0.25);
    }

    .dashboard-btn.blocked {
      background: linear-gradient(135deg, #ff6b6b, #ff8c8c);
      box-shadow: 0 8px 24px rgba(255,107,107,0.15);
    }

    .dashboard-btn.blocked:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(255,107,107,0.25);
    }

    .dashboard-logout {
      width: 100%;
      padding: 12px;
      background: #ff4444;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .dashboard-logout:hover {
      background: #ff6666;
    }

    .dashboard-main {
      max-width: 800px;
      margin: 0 auto;
    }

    #confirmExitModal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.65);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    #confirmExitModal .modal-content {
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      max-width: 360px;
      width: 92%;
      padding: 24px;
      text-align: center;
    }

    #confirmExitModal h3 {
      margin: 0 0 10px 0;
      color: var(--text);
    }

    #confirmExitModal p {
      margin: 0 0 14px 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    #confirmExitModal input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      margin-bottom: 12px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
    }

    .modal-actions button {
      flex: 1;
      border: none;
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      font-weight: 600;
    }

    .confirm-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #081226;
    }

    .cancel-btn {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
    }

    .modal-error {
      margin-top: 10px;
      min-height: 18px;
      color: #ff7b7b;
      font-size: 13px;
    }

    @media (max-width: 480px) {
      .dashboard-buttons {
        grid-template-columns: 1fr;
      }

      .dashboard-btn {
        min-height: 100px;
        padding: 20px 12px;
      }

      .dashboard-btn-icon {
        font-size: 28px;
        margin-bottom: 6px;
      }

      .dashboard-btn-text {
        font-size: 13px;
      }

      .dashboard-welcome h2 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-shapes" aria-hidden="true"></div>
  <main class="page-container">
    <div class="dashboard-main">
      <section class="card">
        <div class="dashboard-welcome">
          <h2>Welcome back, {{ username }}!</h2>
          <p>Stay focused and productive</p>
        </div>

        <div class="dashboard-buttons">
          <a href="/focus" class="dashboard-btn focus">
            <div class="dashboard-btn-icon">🎯</div>
            <div class="dashboard-btn-text">Focus Mode</div>
          </a>
          <a href="/stats" class="dashboard-btn stats">
            <div class="dashboard-btn-icon">📊</div>
            <div class="dashboard-btn-text">Statistics</div>
          </a>
          <a href="/settings" class="dashboard-btn settings">
            <div class="dashboard-btn-icon">✅</div>
            <div class="dashboard-btn-text">Goals</div>
          </a>
          <a href="/blocked" class="dashboard-btn blocked">
            <div class="dashboard-btn-icon">🚫</div>
            <div class="dashboard-btn-text">Blocked Apps</div>
          </a>
          <a href="/history" class="dashboard-btn focus" style="grid-column: 1 / -1;">
            <div class="dashboard-btn-icon">📝</div>
            <div class="dashboard-btn-text">Session History</div>
          </a>
        </div>

        <form action="/logout" method="post">
          <button type="submit" class="dashboard-logout">Logout</button>
        </form>
      </section>
    </div>
  </main>

  <div id="confirmExitModal">
    <div class="modal-content">
      <h3>Confirm Password</h3>
      <p>Enter your password to leave focus mode and access blocked apps.</p>
      <input type="password" id="confirmExitPassword" placeholder="Password">
      <div class="modal-actions">
        <button type="button" class="confirm-btn" id="confirmExitSubmit">Confirm</button>
        <button type="button" class="cancel-btn" id="confirmExitCancel">Cancel</button>
      </div>
      <div class="modal-error" id="confirmExitError"></div>
    </div>
  </div>

  <script>
    const queryParams = new URLSearchParams(window.location.search);
    const confirmExitModal = document.getElementById('confirmExitModal');
    const confirmExitSubmit = document.getElementById('confirmExitSubmit');
    const confirmExitCancel = document.getElementById('confirmExitCancel');
    const confirmExitPassword = document.getElementById('confirmExitPassword');
    const confirmExitError = document.getElementById('confirmExitError');

    const needsExitConfirmation = queryParams.get('confirm_exit') === '1';
    const durationMinutes = parseInt(queryParams.get('duration_minutes') || '0', 10);
    const exitAttempts = parseInt(queryParams.get('exit_attempts') || '0', 10);

    function cleanDashboardUrl() {
      window.history.replaceState({}, '', '/dashboard');
    }

    if (needsExitConfirmation) {
      confirmExitModal.style.display = 'flex';
      confirmExitPassword.focus();
    }

    confirmExitSubmit.addEventListener('click', async () => {
      confirmExitError.textContent = '';
      const password = confirmExitPassword.value.trim();
      const verifyResponse = await fetch('/verify_password', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: `password=${encodeURIComponent(password)}`
      });
      const verifyData = await verifyResponse.json();

      if (!verifyData.success) {
        confirmExitError.textContent = verifyData.error || 'Invalid password';
        return;
      }

      await fetch('/save_session_stats', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          duration_minutes: durationMinutes,
          completed: false,
          exit_attempts: exitAttempts
        })
      });

      await fetch('/stop_blocking', {method: 'POST'});
      cleanDashboardUrl();
      confirmExitModal.style.display = 'none';
    });

    confirmExitCancel.addEventListener('click', () => {
      window.location.href = '/focus';
    });

    confirmExitModal.addEventListener('click', (event) => {
      if (event.target === confirmExitModal) {
        window.location.href = '/focus';
      }
    });
  </script>
</body>
</html>
