<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FocusGuard — To‑Do List</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <style>
    .todo-container { max-width:500px; margin:40px auto; }
    .todo-input { display:flex; gap:8px; margin-bottom:16px; }
    .todo-input input { flex:1; padding:10px; border-radius:8px; border:1px solid rgba(255,255,255,0.2); }
    .todo-input button { padding:10px 16px; border-radius:8px; border:none; background:var(--accent); color:#081226; font-weight:600; cursor:pointer; }
    .todo-list { list-style:none; padding:0; }
    .todo-list li { display:flex; align-items:center; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.1); }
    .todo-list li input[type=checkbox] { margin-right:12px; }
    .todo-list li.completed span { text-decoration:line-through; color:var(--muted); }
    @media (max-width:480px) { .todo-container{margin:20px 16px;} }
  </style>
</head>
<body>
  <div class="bg-shapes" aria-hidden="true"></div>
  <main class="page-container">
    <div class="card todo-container">
      <h1>📝 Today's Goals</h1>
      <div class="todo-input">
        <input id="newGoal" type="text" placeholder="Enter a goal">
        <button id="addGoal">Add</button>
      </div>
      <ul class="todo-list" id="goalList"></ul>
      <button id="celebrateBtn" class="btn primary" style="margin-top:16px;">Celebrate Completion</button>
      <p style="margin-top:30px"><a href="/dashboard" style="color:#7c5cff;text-decoration:underline">Back to Dashboard</a></p>
    </div>
  </main>

  <script>
    const goalInput = document.getElementById('newGoal');
    const addBtn = document.getElementById('addGoal');
    const listEl = document.getElementById('goalList');
    const STORAGE_KEY = 'focusguard_goals';

    function loadGoals() {
      let data = localStorage.getItem(STORAGE_KEY) || '[]';
      try { return JSON.parse(data); } catch { return []; }
    }

    function saveGoals(goals) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(goals));
    }

    function renderGoals() {
      const goals = loadGoals();
      listEl.innerHTML = '';
      goals.forEach((g, idx) => {
        const li = document.createElement('li');
        if (g.done) li.classList.add('completed');
        const chk = document.createElement('input');
        chk.type = 'checkbox';
        chk.checked = g.done;
        chk.addEventListener('change', () => {
          g.done = chk.checked;
          saveGoals(goals);
          renderGoals();
        });
        const span = document.createElement('span');
        span.textContent = g.text;
        li.appendChild(chk);
        li.appendChild(span);
        listEl.appendChild(li);
      });
    }

    addBtn.addEventListener('click', () => {
      const text = goalInput.value.trim();
      if (!text) return;
      const goals = loadGoals();
      goals.push({ text, done: false });
      saveGoals(goals);
      goalInput.value = '';
      renderGoals();
    });

    goalInput.addEventListener('keyup', e => {
      if (e.key === 'Enter') addBtn.click();
    });

    renderGoals();

    const celebrateBtn = document.getElementById('celebrateBtn');
    celebrateBtn.addEventListener('click', () => {
      const goals = loadGoals();
      const allDone = goals.length > 0 && goals.every(g => g.done);
      if (allDone) {
        alert('Congratulations! You have completed all your goals for today! 🎉');
        localStorage.removeItem(STORAGE_KEY);
        renderGoals();
      } else {
        alert('Not all goals are completed yet. Keep going!');
      }
    });
  </script>
</body>
</html>
